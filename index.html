<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chess Game</title>
    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #121212;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 10px;
            box-sizing: border-box;
        }
        .controls {
            margin-bottom: 15px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            background-color: #333;
            color: #fff;
        }
        button.active {
            background-color: #00bcd4;
            color: #000;
        }
        button.reset-btn {
            background-color: #e50914;
            color: #fff;
        }
        .online-panel {
            display: none;
            background-color: #1e1e1e;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            border: 1px solid #333;
            text-align: center;
            max-width: 400px;
            width: 90vw;
            box-sizing: border-box;
        }
        .online-panel input {
            padding: 8px;
            font-size: 14px;
            border-radius: 4px;
            border: 1px solid #555;
            background-color: #2b2b2b;
            color: #fff;
            width: 60%;
            margin-top: 5px;
        }
        .id-display {
            background-color: #2b2b2b;
            padding: 6px;
            border-radius: 4px;
            font-family: monospace;
            cursor: pointer;
            color: #00bcd4;
            display: inline-block;
            margin-top: 5px;
            word-break: break-all;
        }
        #status {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 15px;
            color: #00bcd4;
        }
        #board {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            grid-template-rows: repeat(8, 1fr);
            width: 90vw;
            max-width: 400px;
            aspect-ratio: 1 / 1;
            margin: 0 auto;
            border: 4px solid #333;
            box-sizing: border-box;
            background-color: #b58863;
        }
        .square {
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            width: 100%;
            height: 100%;
        }
        .light { background-color: #f0d9b5; }
        .dark { background-color: #b58863; }
        .square img {
            width: 90%;
            height: 90%;
            object-fit: contain;
            pointer-events: none;
        }
        .selected { background-color: #7b9ec2 !important; }
        .dot {
            width: 12px;
            height: 12px;
            background-color: #00bcd4;
            border-radius: 50%;
            position: absolute;
            z-index: 10;
        }
        #game-over-screen {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.85);
            z-index: 100;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body>

    <div class="controls">
        <button id="mode-2p" class="active" onclick="setMode('2P')">2 Player</button>
        <button id="mode-bot" onclick="setMode('Bot')">Play vs Bot</button>
        <button id="mode-online" onclick="setMode('Online')">Play Online</button>
        <button class="reset-btn" onclick="resetGame(true)">Reset</button>
    </div>

    <div id="online-panel" class="online-panel">
        <div>Your Lobby ID:</div>
        <div id="my-id" class="id-display">Connecting...</div>
        <div style="margin-top: 10px;">
            <input type="text" id="peer-id-input" placeholder="Friend's ID">
            <button onclick="connectToFriend()">Join</button>
        </div>
        <div id="connection-status" style="margin-top: 10px; font-size: 14px; color: #aaa;"></div>
    </div>

    <div id="status">White's Turn</div>
    
    <div style="position: relative;">
        <div id="board"></div>
        <div id="game-over-screen">
            <h2 id="winner-text">Checkmate!</h2>
            <button onclick="resetGame(true)">Play Again</button>
        </div>
    </div>

    <script>
        const imageMap = {
            'P': 'P.jpg',  'R': 'R.jpg',  'N': 'N.jpg',  'B': 'B.jpg',  'Q': 'Q.jpg',  'K': 'K.jpg',
            'p': 'Bp.jpg', 'r': 'Br.jpg', 'n': 'Bn.jpg', 'b': 'BB.jpg', 'q': 'Bq.jpg', 'k': 'Bk.jpg'
        };

        let boardState = [];
        let turn = "W";
        let selectedSquare = null;
        let validMoves = [];
        let gameMode = "2P";
        let isGameOver = false;
        let peer = null;
        let conn = null;
        let myColor = "W";

        let hasMoved = {
            'whiteKing': false, 'whiteRookA': false, 'whiteRookH': false,
            'blackKing': false, 'blackRookA': false, 'blackRookH': false
        };
        let enPassantTarget = null;

        let boardElement, statusElement, gameOverScreen, winnerText, onlinePanel, myIdDisplay, connStatusDisplay;

        function initPeerJS() {
            if (peer) return;
            peer = new Peer();
            peer.on('open', function(id) {
                myIdDisplay.innerText = id;
            });
            peer.on('connection', function(c) {
                conn = c;
                myColor = "W";
                setupConnectionListeners();
                connStatusDisplay.innerText = "Connected! Playing White.";
            });
        }

        function connectToFriend() {
            const friendId = document.getElementById("peer-id-input").value.trim();
            if (!friendId) return;
            conn = peer.connect(friendId);
            myColor = "B";
            setupConnectionListeners();
        }

        function setupConnectionListeners() {
            conn.on('open', function() {
                connStatusDisplay.innerText = "Connected! Playing Black.";
                resetGame(false);
            });
            conn.on('data', function(data) {
                if (data.type === 'move') {
                    movePiece(data.fromR, data.fromC, data.toR, data.toC, data.moveType, false);
                    createBoard();
                } else if (data.type === 'reset') {
                    resetGame(false);
                }
            });
        }

        function createBoard() {
            if (!boardElement) return;
            boardElement.innerHTML = "";
            for (let r = 0; r < 8; r++) {
                for (let c = 0; c < 8; c++) {
                    const square = document.createElement("div");
                    square.classList.add("square");
                    square.classList.add((r + c) % 2 === 0 ? "light" : "dark");
                    
                    const piece = boardState[r] ? boardState[r][c] : '';
                    if (piece) {
                        const img = document.createElement("img");
                        img.src = imageMap[piece] || '';
                        square.appendChild(img);
                    }
                    
                    if (selectedSquare && selectedSquare.r === r && selectedSquare.c === c) {
                        square.classList.add("selected");
                    }
                    
                    if (validMoves.some(m => m.r === r && m.c === c)) {
                        const dot = document.createElement("div");
                        dot.classList.add("dot");
                        square.appendChild(dot);
                    }
                    
                    square.addEventListener("click", () => handleSquareClick(r, c));
                    boardElement.appendChild(square);
                }
            }
        }

        function handleSquareClick(r, c) {
            if (isGameOver) return;
            if (gameMode === "Bot" && turn === "B") return;
            if (gameMode === "Online" && turn !== myColor) return;

            const piece = boardState[r][c];
            const isWhite = piece && piece === piece.toUpperCase();
            const targetMove = validMoves.find(m => m.r === r && m.c === c);

            if (selectedSquare && targetMove) {
                movePiece(selectedSquare.r, selectedSquare.c, r, c, targetMove.type, true);
                selectedSquare = null;
                validMoves = [];
                createBoard();
                if (!isGameOver && gameMode === "Bot" && turn === "B") {
                    setTimeout(makeBotMove, 400);
                }
                return;
            }

            if (piece && ((turn === "W" && isWhite) || (turn === "B" && !isWhite))) {
                selectedSquare = { r, c };
                validMoves = getFilteredLegalMoves(r, c);
            } else {
                selectedSquare = null;
                validMoves = [];
            }
            createBoard();
        }

        function movePiece(fromR, fromC, toR, toC, moveType, sendNetwork) {
            const piece = boardState[fromR][fromC];
            
            if (moveType === "castle-kingside") {
                boardState[toR][toC] = piece;
                boardState[fromR][fromC] = '';
                boardState[toR][5] = boardState[toR][7];
                boardState[toR][7] = '';
            } else if (moveType === "castle-queenside") {
                boardState[toR][toC] = piece;
                boardState[fromR][fromC] = '';
                boardState[toR][3] = boardState[toR][0];
                boardState[toR][0] = '';
            } else if (moveType === "en-passant") {
                boardState[toR][toC] = piece;
                boardState[fromR][fromC] = '';
                boardState[fromR][toC] = '';
            } else {
                boardState[toR][toC] = piece;
                boardState[fromR][fromC] = '';
            }

            if (piece.toLowerCase() === 'p' && Math.abs(toR - fromR) === 2) {
                enPassantTarget = { r: (fromR + toR) / 2, c: fromC };
            } else {
                enPassantTarget = null;
            }

            if (fromR === 7 && fromC === 4) hasMoved.whiteKing = true;
            if (fromR === 7 && fromC === 0) hasMoved.whiteRookA = true;
            if (fromR === 7 && fromC === 7) hasMoved.whiteRookH = true;
            if (fromR === 0 && fromC === 4) hasMoved.blackKing = true;
            if (fromR === 0 && fromC === 0) hasMoved.blackRookA = true;
            if (fromR === 0 && fromC === 7) hasMoved.blackRookH = true;

            if (sendNetwork && gameMode === "Online" && conn) {
                conn.send({ type: 'move', fromR, fromC, toR, toC, moveType });
            }

            turn = turn === "W" ? "B" : "W";
            
            if (hasNoLegalMoves(turn)) {
                isGameOver = true;
                gameOverScreen.style.display = "flex";
                winnerText.innerText = isInCheck(turn) ? (turn === "W" ? "Black Wins!" : "White Wins!") : "Draw!";
                return;
            }
            
            statusElement.innerText = isInCheck(turn) ? "CHECK!" : (turn === "W" ? "White's Turn" : "Black's Turn");
        }

        function isEnemyOrEmpty(r, c, isWhite, state) {
            if (r < 0 || r >= 8 || c < 0 || c >= 8) return { valid: false, stop: true };
            const t = state[r][c];
            if (!t) return { valid: true, stop: false };
            return { valid: (isWhite !== (t === t.toUpperCase())), stop: true };
        }

        function getRawMoves(r, c, state, includeSpecial) {
            const moves = [];
            if (r < 0 || r >= 8 || c < 0 || c >= 8) return moves;
            const piece = state[r][c];
            if (!piece) return moves;
            
            const isWhite = piece === piece.toUpperCase();
            const type = piece.toLowerCase();

            if (type === 'p') {
                const dir = isWhite ? -1 : 1;
                const nextRow
