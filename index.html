<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chess Game</title>
    <!-- PeerJS Library Import -->
    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #121212;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 10px;
            box-sizing: border-box;
            position: relative;
        }

        .controls {
            margin-bottom: 15px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            background-color: #333;
            color: #fff;
        }

        button.active {
            background-color: #00bcd4;
            color: #000;
        }

        button.reset-btn {
            background-color: #e50914;
            color: #fff;
        }

        /* ONLINE MULTIPLAYER BAR */
        .online-panel {
            display: none;
            background-color: #1e1e1e;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            border: 1px solid #333;
            text-align: center;
            max-width: 400px;
            width: 90vw;
            box-sizing: border-box;
        }

        .online-panel input {
            padding: 8px;
            font-size: 14px;
            border-radius: 4px;
            border: 1px solid #555;
            background-color: #2b2b2b;
            color: #fff;
            width: 60%;
            margin-top: 5px;
        }

        .id-display {
            background-color: #2b2b2b;
            padding: 6px;
            border-radius: 4px;
            font-family: monospace;
            cursor: pointer;
            color: #00bcd4;
            display: inline-block;
            margin-top: 5px;
            word-break: break-all;
        }

        #status {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 15px;
            color: #00bcd4;
        }

        #board-container {
            position: relative;
        }

        #board {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            grid-template-rows: repeat(8, 1fr);
            width: 90vw;
            max-width: 400px;
            aspect-ratio: 1 / 1;
            margin: 0 auto;
            border: 2px solid #333; /* Added a minor baseline border layout */
            box-sizing: border-box;
        }
    </style>
</head>
<body>
    <!-- Rest of your body elements and scripts should follow here -->
</body>
</html>
