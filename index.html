<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mobile Chess</title>
    <style>
        * { box-sizing: border-box; user-select: none; -webkit-user-select: none; }
        body { margin: 0; background: #121212; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; }
        #menu { margin-bottom: 15px; display: flex; gap: 10px; }
        button { background: #333; color: white; border: 1px solid #555; padding: 10px 15px; border-radius: 5px; font-weight: bold; font-size: 14px; }
        button.active { background: #00bcd4; border-color: #00e5ff; color: #121212; }
        #status { font-size: 16px; margin-bottom: 15px; font-weight: bold; min-height: 20px; }
        #board { display: grid; grid-template-columns: repeat(8, 1fr); width: 95vw; max-width: 400px; height: 95vw; max-height: 400px; border: 4px solid #333; }
        .square { display: flex; align-items: center; justify-content: center; position: relative; }
        .light { background-color: #f0d9b5; }
        .dark { background-color: #b58863; }
        .square img { width: 85%; height: 85%; object-fit: contain; pointer-events: none; }
        .selected { background-color: #7ab3d5 !important; }
        .valid-move::after { content: ""; width: 25%; height: 25%; background: rgba(0, 188, 212, 0.7); border-radius: 50%; position: absolute; }
    </style>
</head>
<body>

    <div id="menu">
        <button id="btn2P" class="active" onclick="setMode('2P')">2 Player</button>
        <button id="btnBot" onclick="setMode('Bot')">Play vs Bot</button>
    </div>

    <div id="status">White's Turn</div>
    <div id="board"></div>

    <script>
        const boardElement = document.getElementById("board");
        const statusElement = document.getElementById("status");
        
        let gameMode = "2P"; turn = "W"; selectedSquare = null; validMoves = [];

        let boardState = [
            ['r','n','b','q','k','b','n','r'],
            ['p','p','p','p','p','p','p','p'],
            ['','','','','','','',''],
            ['','','','','','','',''],
            ['','','','','','','',''],
            ['','','','','','','',''],
            ['P','P','P','P','P','P','P','P'],
            ['R','N','B','Q','K','B','N','R']
        ];

        // This map connects the game logic to your specific screenshot filenames
        const imageMap = {
            'P': 'P.jpg',  'R': 'R.jpg',  'N': 'N.jpg',  'B': 'B.jpg',  'Q': 'Q.jpg',  'K': 'K.jpg',  // White
            'p': 'Bp.jpg', 'r': 'Br.jpg', 'n': 'Bn.jpg', 'b': 'BB.jpg', 'q': 'Bq.jpg', 'k': 'Bk.jpg'  // Black
        };

        function setMode(mode) { gameMode = mode; resetGame(); }
        function resetGame() {
            boardState = [
                ['r','n','b','q','k','b','n','r'], ['p','p','p','p','p','p','p','p'],
                ['','','','','','','',''], ['','','','','','','',''],
                ['','','','','','','',''], ['','','','','','','',''],
                ['P','P','P','P','P','P','P','P'], ['R','N','B','Q','K','B','N','R']
            ];
            turn = "W"; selectedSquare = null; validMoves = [];
            statusElement.innerText = "White's Turn"; createBoard();
        }

        function createBoard() {
            boardElement.innerHTML = "";
            for (let r = 0; r < 8; r++) {
                for (let c = 0; c < 8; c++) {
                    const square = document.createElement("div");
                    square.classList.add("square", (r + c) % 2 === 0 ? "light" : "dark");
                    
                    const piece = boardState[r][c];
                    if (piece && imageMap[piece]) {
                        const img = document.createElement("img");
                        img.src = imageMap[piece];
                        square.appendChild(img);
                    }

                    if (selectedSquare && selectedSquare.r === r && selectedSquare.c === c) square.classList.add("selected");
                    if (validMoves.some(m => m.r === r && m.c === c)) square.classList.add("valid-move");

                    square.addEventListener("click", () => handleSquareClick(r, c));
                    boardElement.appendChild(square);
                }
            }
        }

        function handleSquareClick(r, c) {
            if (gameMode === "Bot" && turn === "B") return;
            const piece = boardState[r][c];
            const isWhite = piece && piece === piece.toUpperCase();
            
            if (piece && ((turn === "W" && isWhite) || (turn === "B" && !isWhite && gameMode === "2P"))) {
                selectedSquare = { r, c }; validMoves = getBasicMoves(r, c, piece); createBoard(); return;
            }

            if (selectedSquare && validMoves.some(m => m.r === r && m.c === c)) {
                movePiece(selectedSquare.r, selectedSquare.c, r, c);
                selectedSquare = null; validMoves = [];
                if (gameMode === "Bot" && turn === "B") {
                    statusElement.innerText = "Bot thinking...";
                    setTimeout(makeBotMove, 600);
                }
            } else {
                selectedSquare = null; validMoves = []; createBoard();
            }
        }

        function movePiece(fromR, fromC, toR, toC) {
            boardState[toR][toC] = boardState[fromR][fromC]; boardState[fromR][fromC] = '';
            if (boardState[toR][toC] === 'P' && toR === 0) boardState[toR][toC] = 'Q';
            if (boardState[toR][toC] === 'p' && toR === 7) boardState[toR][toC] = 'q';
            turn = turn === "W" ? "B" : "W";
            statusElement.innerText = turn === "W" ? "White's Turn" : "Black's Turn";
            createBoard();
        }

        function getBasicMoves(r, c, piece) {
            let moves = []; const type = piece.toLowerCase(); const isWhite = piece === piece.toUpperCase(); const dir = isWhite ? -1 : 1;
            if (type === 'p') {
                if (r + dir >= 0 && r + dir < 8 && boardState[r + dir][c] === '') {
                    moves.push({ r: r + dir, c });
                    if ((isWhite && r === 6) || (!isWhite && r === 1)) {
                        if (boardState[r + 2 * dir][c] === '') moves.push({ r: r + 2 * dir, c });
                    }
                }
                for (let dc of [-1, 1]) {
                    let tc = c + dc;
                    if (tc >= 0 && tc < 8 && r + dir >= 0 && r + dir < 8) {
                        let tp = boardState[r + dir][tc];
                        if (tp && (tp === tp.toUpperCase()) !== isWhite) moves.push({ r: r + dir, c: tc });
                    }
                }
            } else if (type === 'n') {
                const o = [[-2,-1],[-2,1],[-1,-2],[-1,2],[1,-2],[1,2],[2,-1],[2,1]];
                for (let i of o) {
                    let nr = r + i[0], nc = c + i[1];
                    if (nr >= 0 && nr < 8 && nc >= 0 && nc < 8) {
                        let t = boardState[nr][nc]; if (!t || (t === t.toUpperCase()) !== isWhite) moves.push({ r: nr, c: nc });
                    }
                }
            } else if (type === 'b' || type === 'r' || type === 'q') {
                const dirs = [];
                if (type === 'b' || type === 'q') dirs.push([-1,-1], [-1,1], [1,-1], [1,1]);
                if (type === 'r' || type === 'q') dirs.push([-1,0], [1,0], [0,-1], [0,1]);
                for (let d of dirs) {
                    let nr = r + d[0], nc = c + d[1];
                    while (nr >= 0 && nr < 8 && nc >= 8) {
                        let t = boardState[nr][nc];
                        if (!t) moves.push({ r: nr, c: nc });
                        else { if ((t === t.toUpperCase()) !== isWhite) moves.push({ r: nr, c: nc }); break; }
                        nr += d[0]; nc += d[1];
                    }
                }
            } else if (type === 'k') {
                for (let dr = -1; dr <= 1; dr++) {
                    for (let dc = -1; dc <= 1; dc++) {
                        if (dr === 0 && dc === 0) continue;
                        let nr = r + dr, nc = c + dc;
                        if (nr >= 0 && nr < 8 && nc >= 0 && nc < 8) {
                            let t = boardState[nr][nc]; if (!t || (t === t.toUpperCase()) !== isWhite) moves.push({ r: nr, c: nc });
                        }
                    }
                }
            }
            return moves;
        }

        function makeBotMove() {
            let allMoves = [];
            for (let r = 0; r < 8; r++) {
                for (let c = 0; c < 8; c++) {
                    let piece = boardState[r][c];
                    if (piece && piece === piece.toLowerCase()) {
                        let moves = getBasicMoves(r, c, piece);
                        for (let m of moves) {
                            let weight = boardState[m.r][m.c] !== '' ? 10 : 1;
                            allMoves.push({ fromR: r, fromC: c, toR: m.r, toC: m.c, weight });
                        }
                    }
                }
            }
            if (allMoves.length === 0) { statusElement.innerText = "Game Over."; return; }
            allMoves.sort((a, b) => b.weight - a.weight);
            let topMoves = allMoves.filter(m => m.weight === allMoves[0].weight);
            let chosen = topMoves[Math.floor(Math.random() * topMoves.length)];
            movePiece(chosen.fromR, chosen.fromC, chosen.toR, chosen.toC);
        }

        createBoard();
    </script>
</body>
</html>
