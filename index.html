<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chess Game</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #121212;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 10px;
            box-sizing: border-box;
        }

        .controls {
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            background-color: #333;
            color: #fff;
        }

        button.active {
            background-color: #00bcd4;
            color: #000;
        }

        #status {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 15px;
        }

        /* FIXED BOARD LAYOUT STYLING */
        #board {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            grid-template-rows: repeat(8, 1fr);
            width: 90vw;
            height: 90vw;
            max-width: 400px;
            max-height: 400px;
            margin: 0 auto;
            border: 4px solid #333;
            box-sizing: border-box;
            background-color: #b58863;
        }

        .square {
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            width: 100%;
            height: 100%;
            box-sizing: border-box;
        }

        .light {
            background-color: #f0d9b5;
        }

        .dark {
            background-color: #b58863;
        }

        .square img {
            width: 90%;
            height: 90%;
            object-fit: contain;
            pointer-events: none;
        }

        .selected {
            background-color: #7b9ec2 !important;
        }

        .dot {
            width: 12px;
            height: 12px;
            background-color: #00bcd4;
            border-radius: 50%;
            position: absolute;
            z-index: 10;
        }
    </style>
</head>
<body>

    <div class="controls">
        <button id="mode-2p" class="active" onclick="setMode('2P')">2 Player</button>
        <button id="mode-bot" onclick="setMode('Bot')">Play vs Bot</button>
    </div>

    <div id="status">White's Turn</div>
    <div id="board"></div>

    <script>
        const imageMap = {
            'P': 'P.jpg',  'R': 'R.jpg',  'N': 'N.jpg',  'B': 'B.jpg',  'Q': 'Q.jpg',  'K': 'K.jpg',
            'p': 'Bp.jpg', 'r': 'Br.jpg', 'n': 'Bn.jpg', 'b': 'Bb.jpg', 'q': 'Bq.jpg', 'k': 'Bk.jpg'
        };

        let boardState = [
            ['r','n','b','q','k','b','n','r'],
            ['p','p','p','p','p','p','p','p'],
            ['','','','','','','',''],
            ['','','','','','','',''],
            ['','','','','','','',''],
            ['','','','','','','',''],
            ['P','P','P','P','P','P','P','P'],
            ['R','N','B','Q','K','B','N','R']
        ];

        let turn = "W";
        let selectedSquare = null;
        let validMoves = [];
        let gameMode = "2P";

        const boardElement = document.getElementById("board");
        const statusElement = document.getElementById("status");

        function createBoard() {
            boardElement.innerHTML = "";
            for (let r = 0; r < 8; r++) {
                for (let c = 0; c < 8; c++) {
                    const square = document.createElement("div");
                    square.classList.add("square");
                    square.classList.add((r + c) % 2 === 0 ? "light" : "dark");
                    
                    const piece = boardState[r][c];
                    if (piece && imageMap[piece]) {
                        const img = document.createElement("img");
                        img.src = imageMap[piece]; // Direct path fix applied
                        square.appendChild(img);
                    }

                    if (selectedSquare && selectedSquare.r === r && selectedSquare.c === c) {
                        square.classList.add("selected");
                    }

                    if (validMoves.some(m => m.r === r && m.c === c)) {
                        const dot = document.createElement("div");
                        dot.classList.add("dot");
                        square.appendChild(dot);
                    }

                    square.addEventListener("click", () => handleSquareClick(r, c));
                    boardElement.appendChild(square);
                }
            }
        }

        function handleSquareClick(r, c) {
            if (gameMode === "Bot" && turn === "B") return;

            const piece = boardState[r][c];
            const isWhite = piece && piece === piece.toUpperCase();

            if (selectedSquare && validMoves.some(m => m.r === r && m.c === c)) {
                movePiece(selectedSquare.r, selectedSquare.c, r, c);
                selectedSquare = null;
                validMoves = [];
                createBoard();
                
                if (gameMode === "Bot" && turn === "B") {
                    setTimeout(makeBotMove, 500);
                }
                return;
            }

            if (piece && ((turn === "W" && isWhite) || (turn === "B" && !isWhite))) {
                selectedSquare = { r, c };
                validMoves = getBasicMoves(r, c);
            } else {
                selectedSquare = null;
                validMoves = [];
            }
            createBoard();
        }

        function movePiece(fromR, fromC, toR, toC) {
            boardState[toR][toC] = boardState[fromR][fromC];
            boardState[fromR][fromC] = '';
            turn = turn === "W" ? "B" : "W";
            statusElement.innerText = turn === "W" ? "White's Turn" : "Black's Turn";
        }

        function getBasicMoves(r, c) {
            const moves = [];
            const directions = [
                {r: 1, c: 0}, {r: -1, c: 0}, {r: 0, c: 1}, {r: 0, c: -1},
                {r: 1, c: 1}, {r: 1, c: -1}, {r: -1, c: 1}, {r: -1, c: -1}
            ];
            
            // Simple validation demo: Allow moving to adjacent empty blocks or enemy pieces
            directions.forEach(d => {
                const targetR = r + d.r;
                const targetC = c + d.c;
                if (targetR >= 0 && targetR < 8 && targetC >= 0 && targetC < 8) {
                    moves.push({ r: targetR, c: targetC });
                }
            });
            return moves;
        }

        function setMode(mode) {
            gameMode = mode;
            document.getElementById("mode-2p").classList.toggle("active", mode === "2P");
            document.getElementById("mode-bot").classList.toggle("active", mode === "Bot");
            resetGame();
        }

        function makeBotMove() {
            const allMoves = [];
            for (let r = 0; r < 8; r++) {
                for (let c = 0; c < 8; c++) {
                    const piece = boardState[r][c];
                    if (piece && piece === piece.toLowerCase()) {
                        const moves = getBasicMoves(r, c);
                        moves.forEach(m => allMoves.push({ fromR: r, fromC: c, toR: m.r, toC: m.c }));
                    }
                }
            }
            if (allMoves.length > 0) {
                const randomMove = allMoves[Math.floor(Math.random() * allMoves.length)];
                movePiece(randomMove.fromR, randomMove.fromC, randomMove.toR, randomMove.toC);
            }
            createBoard();
        }

        function resetGame() {
            boardState = [
                ['r','n','b','q','k','b','n','r'],
                ['p','p','p','p','p','p','p','p'],
                ['','','','','','','',''],
                ['','','','','','','',''],
                ['','','','','','','',''],
                ['','','','','','','',''],
                ['P','P','P','P','P','P','P','P'],
                ['R','N','B','Q','K','B','N','R']
            ];
            turn = "W";
            selectedSquare = null;
            validMoves = [];
            statusElement.innerText = "White's Turn";
            createBoard();
        }

        createBoard();
    </script>
</body>
</html>
