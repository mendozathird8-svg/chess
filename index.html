<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chess Game</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #121212;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 10px;
            box-sizing: border-box;
        }

        .controls {
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            background-color: #333;
            color: #fff;
        }

        button.active {
            background-color: #00bcd4;
            color: #000;
        }

        button.reset-btn {
            background-color: #e50914;
            color: #fff;
        }

        #status {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 15px;
            color: #00bcd4;
        }

        #board {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            grid-template-rows: repeat(8, 1fr);
            width: 90vw;
            height: 90vw;
            max-width: 400px;
            max-height: 400px;
            margin: 0 auto;
            border: 4px solid #333;
            box-sizing: border-box;
            background-color: #b58863;
        }

        .square {
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            width: 100%;
            height: 100%;
            box-sizing: border-box;
        }

        .light {
            background-color: #f0d9b5;
        }

        .dark {
            background-color: #b58863;
        }

        .square img {
            width: 90%;
            height: 90%;
            object-fit: contain;
            pointer-events: none;
        }

        .selected {
            background-color: #7b9ec2 !important;
        }

        .dot {
            width: 12px;
            height: 12px;
            background-color: #00bcd4;
            border-radius: 50%;
            position: absolute;
            z-index: 10;
        }
    </style>
</head>
<body>

    <div class="controls">
        <button id="mode-2p" class="active" onclick="setMode('2P')">2 Player</button>
        <button id="mode-bot" onclick="setMode('Bot')">Play vs Bot</button>
        <button class="reset-btn" onclick="resetGame()">Reset</button>
    </div>

    <div id="status">White's Turn</div>
    <div id="board"></div>

    <script>
        const imageMap = {
            'P': 'P.jpg',  'R': 'R.jpg',  'N': 'N.jpg',  'B': 'B.jpg',  'Q': 'Q.jpg',  'K': 'K.jpg',
            'p': 'Bp.jpg', 'r': 'Br.jpg', 'n': 'Bn.jpg', 'b': 'BB.jpg', 'q': 'Bq.jpg', 'k': 'Bk.jpg'
        };

        let boardState = [
            ['r','n','b','q','k','b','n','r'],
            ['p','p','p','p','p','p','p','p'],
            ['','','','','','','',''],
            ['','','','','','','',''],
            ['','','','','','','',''],
            ['','','','','','','',''],
            ['P','P','P','P','P','P','P','P'],
            ['R','N','B','Q','K','B','N','R']
        ];

        let turn = "W";
        let selectedSquare = null;
        let validMoves = [];
        let gameMode = "2P";
        let isGameOver = false;

        const boardElement = document.getElementById("board");
        const statusElement = document.getElementById("status");

        function createBoard() {
            boardElement.innerHTML = "";
            for (let r = 0; r < 8; r++) {
                for (let c = 0; c < 8; c++) {
                    const square = document.createElement("div");
                    square.classList.add("square");
                    square.classList.add((r + c) % 2 === 0 ? "light" : "dark");
                    
                    const piece = boardState[r][c];
                    if (piece && imageMap[piece]) {
                        const img = document.createElement("img");
                        img.src = imageMap[piece];
                        square.appendChild(img);
                    }

                    if (selectedSquare && selectedSquare.r === r && selectedSquare.c === c) {
                        square.classList.add("selected");
                    }

                    if (validMoves.some(m => m.r === r && m.c === c)) {
                        const dot = document.createElement("div");
                        dot.classList.add("dot");
                        square.appendChild(dot);
                    }

                    square.addEventListener("click", () => handleSquareClick(r, c));
                    boardElement.appendChild(square);
                }
            }
        }

        function handleSquareClick(r, c) {
            if (isGameOver) return;
            if (gameMode === "Bot" && turn === "B") return;

            const piece = boardState[r][c];
            const isWhite = piece && piece === piece.toUpperCase();

            if (selectedSquare && validMoves.some(m => m.r === r && m.c === c)) {
                movePiece(selectedSquare.r, selectedSquare.c, r, c);
                selectedSquare = null;
                validMoves = [];
                createBoard();
                
                if (!isGameOver && gameMode === "Bot" && turn === "B") {
                    setTimeout(makeBotMove, 500);
                }
                return;
            }

            if (piece && ((turn === "W" && isWhite) || (turn === "B" && !isWhite))) {
                selectedSquare = { r, c };
                validMoves = getFilteredLegalMoves(r, c);
            } else {
                selectedSquare = null;
                validMoves = [];
            }
            createBoard();
        }

        function movePiece(fromR, fromC, toR, toC) {
            const capturedPiece = boardState[toR][toC];
            
            boardState[toR][toC] = boardState[fromR][fromC];
            boardState[fromR][fromC] = '';

            if (capturedPiece === 'k') {
                statusElement.innerText = "🏆 White Wins!";
                isGameOver = true;
                return;
            } else if (capturedPiece === 'K') {
                statusElement.innerText = "🏆 Black Wins!";
                isGameOver = true;
                return;
            }

            turn = turn === "W" ? "B" : "W";
            
            // Check if next player has any legal moves. If not, game over.
            if (hasNoLegalMoves(turn)) {
                if (isInCheck(turn)) {
                    statusElement.innerText = turn === "W" ? "🏆 Black Wins by Checkmate!" : "🏆 White Wins by Checkmate!";
                } else {
                    statusElement.innerText = "🤝 Draw by Stalemate!";
                }
                isGameOver = true;
                return;
            }

            if (isInCheck(turn)) {
                statusElement.innerText = turn === "W" ? "White is in CHECK!" : "Black is in CHECK!";
            } else {
                statusElement.innerText = turn === "W" ? "White's Turn" : "Black's Turn";
            }
        }

        function isEnemyOrEmpty(r, c, isWhite, state = boardState) {
            if (r < 0 || r >= 8 || c < 0 || c >= 8) return { valid: false, stop: true };
            const target = state[r][c];
            if (!target) return { valid: true, stop: false };
            const targetIsWhite = target === target.toUpperCase();
            if (isWhite !== targetIsWhite) return { valid: true, stop: true };
            return { valid: false, stop: true };
        }

        function getRawMoves(r, c, state = boardState) {
            const moves = [];
            const piece = state[r][c];
            if (!piece) return moves;
            const isWhite = piece === piece.toUpperCase();
            const type = piece.toLowerCase();

            if (type === 'p') {
                const dir = isWhite ? -1 : 1;
                const startRow = isWhite ? 6 : 1;
                
                if (r + dir >= 0 && r + dir < 8 && !state[r + dir][c]) {
                    moves.push({ r: r + dir, c });
                    if (r === startRow && !state[r + 2 * dir][c]) {
                        moves.push({ r: r + 2 * dir, c });
                    }
                }
                [-1, 1].forEach(dc => {
                    const targetR = r + dir;
                    const targetC = c + dc;
                    if (targetR >= 0 && targetR < 8 && targetC >= 0 && targetC < 8) {
                        const target = state[targetR][targetC];
                        if (target && (target === target.toUpperCase()) !== isWhite) {
                            moves.push({ r: targetR, c: targetC });
                        }
                    }
                });
            }

            if (type === 'r' || type === 'q') {
                const dirs = [{r:1,c:0}, {r:-1,c:0}, {r:0,c:1}, {r:0,c:-1}];
                dirs.forEach(d => {
                    let steps = 1;
                    while (true) {
                        const res = isEnemyOrEmpty(r + d.r * steps, c + d.c * steps, isWhite, state);
                        if (res.valid) moves.push({ r: r + d.r * steps, c: c + d.c * steps });
                        if (res.stop) break;
                        steps++;
                    }
                });
            }

            if (type === 'b' || type === 'q') {
                const dirs = [{r:1,c:1}, {r:1,c:-1}, {r:-1,c:1}, {r:-1,c:-1}];
                dirs.forEach(d => {
                    let steps = 1;
                    while (true) {
                        const res = isEnemyOrEmpty(r + d.r * steps, c + d.c * steps, isWhite, state);
                        if (res.valid) moves.push({ r: r + d.r * steps, c: c + d.c * steps });
                        if (res.stop) break;
                        steps++;
                    }
                });
            }

            if (type === 'n') {
                const jumps = [
                    {r:2,c:1}, {r:2,c:-1}, {r:-2,c:1}, {r:-2,c:-1},
                    {r:1,c:2}, {r:1,c:-2}, {r:-1,c:2}, {r:-1,c:-2}
                ];
                jumps.forEach(j => {
                    const res = isEnemyOrEmpty(r + j.r, c + j.c, isWhite, state);
                    if (res.valid) moves.push({ r: r + j.r, c: c + j.c });
                });
            }

            if (type === 'k') {
                const steps = [
                    {r:1,c:0}, {r:-1,c:0}, {r:0,c:1}, {r:0,c:-1},
                    {r:1,c:1}, {r:1,c:-1}, {r:-1,c:1}, {r:-1,c:-1}
                ];
                steps.forEach(s => {
                    const res = isEnemyOrEmpty(r + s.r, c + s.c, isWhite, state);
                    if (res.valid) moves.push({ r: r + s.r, c: c + s.c });
                });
            }

            return moves;
        }

        // Simulates the move in the background to confirm it doesn't leave the king in check
        function getFilteredLegalMoves(r, c) {
            const rawMoves = getRawMoves(r, c, boardState);
            const piece = boardState[r][c];
            const isWhite = piece === piece.toUpperCase();
            const side = isWhite ? "W" : "B";

            return rawMoves.filter(m => {
                // Save state
                const originalTarget = boardState[m.r][m.c];
                // Try move
                boardState[m.r][m.c] = boardState[r][c];
                boardState[r][c] = '';
                
                const safe = !isInCheck(side);

                // Revert move
                boardState[r][c] = boardState[m.r][m.c];
                boardState[m.r][m.c] = originalTarget;

                return safe;
            });
        }

        function isInCheck(side) {
            let kingPos = null;
            const targetKing = side === "W" ? "K" : "k";

            // Find King
            for (let r = 0; r < 8; r++) {
                for (let c = 0; c < 8; c++) {
                    if (boardState[r][c] === targetKing) {
                        kingPos = { r, c };
                        break;
                    }
                }
                if (kingPos) break;
            }
            if (!kingPos) return false;

            // Check if any enemy piece attacks the king position
            for (let r = 0; r < 8; r++) {
                for (let c = 0; c < 8; c++) {
                    const piece = boardState[r][c];
                    if (piece) {
                        const isWhite = piece === piece.toUpperCase();
                        if ((side === "W" && !isWhite) || (side === "B" && isWhite)) {
                            const enemyMoves = getRawMoves(r, c, boardState);
                            if (enemyMoves.some(m => m.r === kingPos.r && m.c === kingPos.c)) {
                                return true;
                            }
                        }
                    }
                }
            }
            return false;
        }

        function hasNoLegalMoves(side) {
            for (let r = 0; r < 8; r++) {
                for (let c = 0; c < 8; c++) {
                    const piece = boardState[r][c];
                    if (piece) {
                        const isWhite = piece === piece.toUpperCase();
                        if ((side === "W" && isWhite) || (side === "B" && !isWhite)) {
                            const legal = getFilteredLegalMoves(r, c);
                            if (legal.length > 0) return false;
                        }
                    }
                }
            }
            return true;
        }

        function setMode(mode) {
            gameMode = mode;
            document.getElementById("mode-2p").classList.toggle("active", mode === "2P");
            document.getElementById("mode-bot").classList.toggle("active", mode === "Bot");
            resetGame();
        }

        function makeBotMove() {
            if (isGameOver) return;
            const allMoves = [];
            for (let r = 0; r < 8; r++) {
                for (let c = 0; c < 8; c++) {
                    const piece = boardState[r][c];
                    if (piece && piece === piece.toLowerCase()) {
                        const moves = getFilteredLegalMoves(r, c);
                        moves.forEach(m => allMoves.push({ fromR: r, fromC: c, toR: m.r, toC: m.c }));
                    }
                }
            }
            if (allMoves.length > 0) {
                const randomMove = allMoves[Math.floor(Math.random() * allMoves.length)];
                movePiece(randomMove.fromR, randomMove.fromC, randomMove.toR, randomMove.toC);
            }
            createBoard();
        }

        function resetGame() {
            boardState = [
                ['r','n','b','q','k','b','n','r'],
                ['p','p','p','p','p','p','p','p'],
                ['','','','','','','',''],
                ['','','','','','','',''],
                ['','','','','','','',''],
                ['','','','','','','',''],
                ['P','P','P','P','P','P','P','P'],
                ['R','N','B','Q','K','B','N','R']
            ];
            turn = "W";
            selectedSquare = null;
            validMoves = [];
            isGameOver = false;
            statusElement.innerText = "White's Turn";
            createBoard();
        }

        createBoard();
    </script>
</body>
</html>
